name: Test

on: [push, workflow_dispatch]

permissions:
  contents: read

jobs:
  matrix-build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.image }}
    strategy:
      matrix:
        include:
          - image: ubuntu-latest
            arch: amd64
            label: Ubuntu 24 / amd64
          - image: ubuntu-24.04-arm
            arch: arm64
            label: Ubuntu 24 / arm64
          - image: macos-26-intel
            arch: amd64
            label: macOS 26 / amd64
          - image: macos-26-arm
            arch: arm64
            label: macOS 26 / arm64
          - image: windows-latest
            arch: amd64
            label: Windows 11 / amd64

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: './go.mod'

    - name: Test examples
      run: go test -v -gcflags="all=-N -l" ./examples/...

    - name: Unit tests
      run: go test -v -gcflags="all=-N -l" -coverprofile coverage.out .

    - name: Upload coverage reports to Codecov
      if: ${{ matrix.image == 'ubuntu-latest' && matrix.arch == 'amd64' && github.ref == 'refs/heads/main' }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  win-arm64:
    name: Windows 11 / arm64
    runs-on: windows-11-arm
    steps:
      # Prevent Git from converting LF to CRLF, which can cause test failures on Windows
      - run: git config --global core.autocrlf input
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          install: mingw-w64-clang-aarch64-gcc-compat mingw-w64-clang-aarch64-go

      - name: Test
        shell: msys2 {0}
        run: |
          go test -v -gcflags="all=-N -l" ./examples/...
          go test -v -gcflags="all=-N -l" -coverprofile coverage.out .

  freebsd-amd64:
    name: FreeBSD 15 / amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Test
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          copyback: false
          prepare: |
            pkg install -y go
          run: |
            go test -v -gcflags="all=-N -l" ./examples/...
            go test -v -gcflags="all=-N -l" -coverprofile coverage.out .

  freebsd-arm64:
    name: FreeBSD 15 / arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Test
        uses: vmactions/freebsd-vm@v1
        with:
          arch: aarch64
          usesh: true
          copyback: false
          prepare: |
            pkg install -y go
          run: |
            go test -v -gcflags="all=-N -l" ./examples/...
            go test -v -gcflags="all=-N -l" -coverprofile coverage.out .
